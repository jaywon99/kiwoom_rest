<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kiwoom REST API Playground</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f0f2f5; }
        .left-pane { width: 280px; min-width: 280px; border-right: 1px solid #ccc; overflow-y: auto; background: #ffffff; display: flex; flex-direction: column; }
        .api-list-container { flex: 1; overflow-y: auto; }
        .settings-container { padding: 15px; border-top: 1px solid #eee; background: #fafafa; }
        .settings-btn { width: 100%; padding: 10px; background: #6c757d; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .settings-btn:hover { background: #5a6268; }
        
        .middle-pane { width: 400px; min-width: 400px; border-right: 1px solid #ccc; padding: 20px; overflow-y: auto; background: #ffffff; box-shadow: 2px 0 5px rgba(0,0,0,0.05); z-index: 10; }
        .right-pane { flex: 1; padding: 20px; overflow-y: auto; background: #282c34; color: #abb2bf; display: flex; flex-direction: column; }
        
        .api-item { padding: 10px 15px 10px 45px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; position: relative; }
        .api-item::before { content: "•"; position: absolute; left: 30px; color: #999; }
        .api-item:hover { background: #f5f7fa; }
        .api-item.active { background: #e6f0ff; font-weight: bold; color: #0056b3; border-left: 4px solid #0056b3; padding-left: 41px; }
        .api-item.active::before { color: #0056b3; left: 26px; }
        
        .group-header { padding: 12px 15px; background: #e9ecef; font-weight: bold; cursor: pointer; border-bottom: 1px solid #ccc; font-size: 14px; color: #333; display: flex; justify-content: space-between; }
        .group-header:hover { background: #dfe3e8; }
        .group-content { display: none; }
        .group-content.open { display: block; }
        
        .cat-header { padding: 10px 15px 10px 25px; background: #f8f9fa; font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; color: #555; }
        .cat-header:hover { background: #f1f3f5; }
        .cat-content { display: none; }
        .cat-content.open { display: block; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 2px rgba(0,123,255,.25); }
        
        button { padding: 12px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 14px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #a0c4ff; cursor: not-allowed; }
        
        pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; font-family: 'Courier New', Courier, monospace; font-size: 14px; line-height: 1.5; }
        
        h2 { margin-top: 0; font-size: 1.5em; color: #333; }
        h3 { color: #333; }
        .section-title { font-size: 1.1em; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 15px; font-weight: bold; color: #555; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: #fff; padding: 25px; border-radius: 8px; width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #6c757d; }
        .btn-cancel:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
    </style>
</head>
<body>

<div class="left-pane" id="api-list">
    <h3 style="padding: 15px 15px 5px 15px; margin: 0; border-bottom: 1px solid #eee;">API 목록</h3>
    <div class="api-list-container" id="api-items"></div>
    <div class="settings-container">
        <button class="settings-btn" id="open-settings-btn">⚙️ 환경 설정 (OAuth 로그인)</button>
        <div style="margin-top: 10px; font-size: 12px; color: #666; text-align: center;">
            접속 공인 IP: <span id="public-ip-display">확인 중...</span>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal">
        <h2 style="margin-bottom: 20px; font-size: 1.3em;">키움 API 환경 설정</h2>
        <div class="form-group">
            <label>App Key</label>
            <input type="text" id="setting-appkey" placeholder="키움증권 App Key">
        </div>
        <div class="form-group">
            <label>Secret Key</label>
            <input type="password" id="setting-secretkey" placeholder="키움증권 Secret Key">
        </div>
        <div class="form-group">
            <label>Account ID (계좌번호)</label>
            <input type="text" id="setting-accid" placeholder="8자리 계좌번호 (Optional)">
        </div>
        <div class="form-group">
            <label>Base URL</label>
            <select id="setting-baseurl">
                <option value="https://mockapi.kiwoom.com">모의투자 (https://mockapi.kiwoom.com)</option>
                <option value="https://api.kiwoom.com">실전투자 (https://api.kiwoom.com)</option>
            </select>
        </div>
        <div class="form-group">
            <label>WebSocket URL (Optional)</label>
            <input type="text" id="setting-wsurl" placeholder="예: wss://api.kiwoom.com:10000 (기본값)">
        </div>
        <div class="modal-buttons">
            <button class="btn-danger" id="clear-settings-btn" style="margin-right: auto;">로그아웃 (초기화)</button>
            <button class="btn-cancel" id="close-settings-btn">취소</button>
            <button id="save-settings-btn">저장 및 세션 적용</button>
        </div>
    </div>
</div>

<div class="middle-pane">
    <h2 id="current-api-title" style="margin-bottom: 20px;">API를 선택하세요</h2>
    <div id="api-form-container" style="display: none;">
        <div class="section-title">Headers</div>
        <div id="headers-form"></div>
        
        <div class="section-title" style="margin-top: 25px;">Parameters</div>
        <div id="params-form"></div>
        
        <button id="execute-btn" style="margin-top: 25px; width: 100%;">실행 (Execute)</button>
    </div>
</div>

<div class="right-pane">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin:0; color:#fff;">결과 (Response)</h3>
        <button id="download-btn" style="padding: 6px 12px; background: #28a745; display: none; font-size: 12px;">다운로드 (JSON)</button>
    </div>
    <pre id="response-output" style="flex: 1; margin: 0;">결과가 여기에 표시됩니다.</pre>
</div>

<script>
    let apis = [];

    fetch('/api/apis_spec')
        .then(res => res.json())
        .then(data => {
            // OAuth 인증은 백엔드에서 자동 처리되므로 UI에서 제외
            apis = data.filter(api => api.group !== "OAuth 인증");
            renderApiList();
        })
        .catch(err => {
            document.getElementById("api-items").innerHTML = "<div style='padding:15px; color:red;'>API 목록을 불러오지 못했습니다.</div>";
            console.error(err);
        });

    let currentApi = null;
    let lastResponseData = null;
    let ws = null;

    const apiItemsContainer = document.getElementById("api-items");
    const currentApiTitle = document.getElementById("current-api-title");
    const apiFormContainer = document.getElementById("api-form-container");
    const headersForm = document.getElementById("headers-form");
    const paramsForm = document.getElementById("params-form");
    const executeBtn = document.getElementById("execute-btn");
    const responseOutput = document.getElementById("response-output");
    const downloadBtn = document.getElementById("download-btn");

    function appendResponse(data) {
        if (!responseOutput.textContent || responseOutput.textContent === "결과가 여기에 표시됩니다." || responseOutput.textContent === "Loading...") {
            responseOutput.textContent = "";
        }
        const prefix = `\n[${new Date().toLocaleTimeString()}] `;
        responseOutput.textContent += prefix + JSON.stringify(data, null, 2) + "\n";
        responseOutput.scrollTop = responseOutput.scrollHeight;
    }

    function ensureWebSocket() {
        return new Promise((resolve, reject) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                resolve(ws);
                return;
            }
            
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${protocol}//${window.location.host}/api/ws_proxy`);
            
            ws.onopen = () => {
                ws.send(JSON.stringify({
                    appkey: safeGetItem("kiwoom_appkey") || null,
                    secretkey: safeGetItem("kiwoom_secretkey") || null,
                    base_url: safeGetItem("kiwoom_baseurl") || null,
                    ws_url: safeGetItem("kiwoom_wsurl") || null
                }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.status === "connected") {
                    resolve(ws);
                } else if (data.error && data.error.includes("Kiwoom WS connect failed")) {
                    reject(new Error(data.error));
                } else {
                    appendResponse(data);
                }
            };
            
            ws.onerror = (error) => {
                reject(error);
            };
            
            ws.onclose = () => {
                ws = null;
            };
        });
    }

    // Settings Modal Logic
    const settingsModal = document.getElementById("settings-modal");
    const openSettingsBtn = document.getElementById("open-settings-btn");
    const closeSettingsBtn = document.getElementById("close-settings-btn");
    const saveSettingsBtn = document.getElementById("save-settings-btn");
    const clearSettingsBtn = document.getElementById("clear-settings-btn");

    function safeSetItem(key, value) {
        if (!value) localStorage.removeItem(key);
        else localStorage.setItem(key, btoa(encodeURIComponent(value)));
    }
    
    function safeGetItem(key) {
        const val = localStorage.getItem(key);
        if (!val) return "";
        try {
            return decodeURIComponent(atob(val));
        } catch(e) {
            return val; // Fallback for old unencrypted values
        }
    }

    function loadSettings() {
        document.getElementById("setting-appkey").value = safeGetItem("kiwoom_appkey");
        document.getElementById("setting-secretkey").value = safeGetItem("kiwoom_secretkey");
        document.getElementById("setting-accid").value = safeGetItem("kiwoom_accid");
        document.getElementById("setting-baseurl").value = safeGetItem("kiwoom_baseurl") || "https://mockapi.kiwoom.com";
        document.getElementById("setting-wsurl").value = safeGetItem("kiwoom_wsurl");
    }

    openSettingsBtn.onclick = () => {
        loadSettings();
        settingsModal.style.display = "flex";
    };

    closeSettingsBtn.onclick = () => {
        settingsModal.style.display = "none";
    };

    saveSettingsBtn.onclick = () => {
        safeSetItem("kiwoom_appkey", document.getElementById("setting-appkey").value);
        safeSetItem("kiwoom_secretkey", document.getElementById("setting-secretkey").value);
        safeSetItem("kiwoom_accid", document.getElementById("setting-accid").value);
        safeSetItem("kiwoom_baseurl", document.getElementById("setting-baseurl").value);
        safeSetItem("kiwoom_wsurl", document.getElementById("setting-wsurl").value);
        settingsModal.style.display = "none";
        alert("설정이 안전하게 난독화되어 저장되었습니다.");
    };

    clearSettingsBtn.onclick = async () => {
        if(confirm("키움증권 서버에서 토큰을 폐기하고, 저장된 환경 설정(Key 정보)을 모두 삭제하시겠습니까?")) {
            clearSettingsBtn.disabled = true;
            clearSettingsBtn.textContent = "처리 중...";
            
            const payload = {
                appkey: safeGetItem("kiwoom_appkey") || null,
                secretkey: safeGetItem("kiwoom_secretkey") || null,
                base_url: safeGetItem("kiwoom_baseurl") || null
            };
            
            try {
                await fetch("/api/logout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch(e) {
                console.error("Logout API failed", e);
            }
            
            localStorage.removeItem("kiwoom_appkey");
            localStorage.removeItem("kiwoom_secretkey");
            localStorage.removeItem("kiwoom_accid");
            localStorage.removeItem("kiwoom_baseurl");
            localStorage.removeItem("kiwoom_wsurl");
            loadSettings();
            
            clearSettingsBtn.disabled = false;
            clearSettingsBtn.textContent = "로그아웃 (초기화)";
            settingsModal.style.display = "none";
            alert("키움증권 토큰 폐기 및 로그아웃(초기화)이 완료되었습니다.");
        }
    };

    function renderApiList() {
        apiItemsContainer.innerHTML = "";
        
        const groups = {};
        apis.forEach(api => {
            if (!groups[api.group]) groups[api.group] = {};
            if (!groups[api.group][api.category]) groups[api.group][api.category] = [];
            groups[api.group][api.category].push(api);
        });
        
        for (const [gName, categories] of Object.entries(groups)) {
            const gHeader = document.createElement("div");
            gHeader.className = "group-header";
            gHeader.innerHTML = `<span>${gName}</span> <span>+</span>`;
            
            const gContent = document.createElement("div");
            gContent.className = "group-content";
            
            gHeader.onclick = () => {
                const isOpen = gContent.classList.contains("open");
                gContent.classList.toggle("open");
                gHeader.innerHTML = `<span>${gName}</span> <span>${isOpen ? '+' : '-'}</span>`;
            };
            
            for (const [cName, apiList] of Object.entries(categories)) {
                const cHeader = document.createElement("div");
                cHeader.className = "cat-header";
                cHeader.innerHTML = `<span>└ ${cName} (${apiList.length})</span>`;
                
                const cContent = document.createElement("div");
                cContent.className = "cat-content";
                
                cHeader.onclick = () => {
                    cContent.classList.toggle("open");
                };
                
                apiList.forEach(api => {
                    const div = document.createElement("div");
                    div.className = "api-item";
                    div.textContent = `${api.name} (${api.id})`;
                    div.onclick = () => selectApi(api, div);
                    cContent.appendChild(div);
                });
                
                gContent.appendChild(cHeader);
                gContent.appendChild(cContent);
            }
            
            apiItemsContainer.appendChild(gHeader);
            apiItemsContainer.appendChild(gContent);
        }
    }

    // Fetch Public IP
    fetch("https://api.ipify.org?format=json")
        .then(res => res.json())
        .then(data => {
            document.getElementById("public-ip-display").textContent = data.ip;
        })
        .catch(() => {
            document.getElementById("public-ip-display").textContent = "가져올 수 없음";
        });

    function selectApi(api, element) {
        document.querySelectorAll(".api-item").forEach(el => el.classList.remove("active"));
        if (element) element.classList.add("active");
        
        currentApi = api;
        currentApiTitle.textContent = `${api.name} (${api.method} ${api.path})`;
        apiFormContainer.style.display = "block";
        responseOutput.textContent = "결과가 여기에 표시됩니다.";
        downloadBtn.style.display = "none";
        lastResponseData = null;
        
        headersForm.innerHTML = "";
        const seenHeaders = new Set();
        api.headers.forEach(h => {
            if (h.key === "api-id" || seenHeaders.has(h.key)) return;
            seenHeaders.add(h.key);
            
            headersForm.innerHTML += `
                <div class="form-group">
                    <label>${h.key}</label>
                    <input type="text" id="header-${h.key}" placeholder="${h.desc}">
                </div>
            `;
        });
        
        paramsForm.innerHTML = "";
        const seenParams = new Set();
        api.params.forEach(p => {
            if (seenParams.has(p.key)) return;
            seenParams.add(p.key);
            
            let defaultVal = p.default || '';
            if (!defaultVal && (p.key.toLowerCase() === 'acctno' || p.key.toLowerCase() === 'acnt_no')) {
                defaultVal = safeGetItem("kiwoom_accid") || '';
            }
            
            paramsForm.innerHTML += `
                <div class="form-group">
                    <label>${p.key}</label>
                    <input type="text" id="param-${p.key}" placeholder="${p.desc}" value="${defaultVal}">
                </div>
            `;
        });
    }

    executeBtn.onclick = async () => {
        if (!currentApi) return;
        
        executeBtn.disabled = true;
        executeBtn.textContent = "실행 중...";
        
        if (currentApi.path !== "/api/dostk/websocket") {
            responseOutput.textContent = "Loading...";
        }
        
        const headers = {};
        currentApi.headers.forEach(h => {
            const el = document.getElementById(`header-${h.key}`);
            if (el && el.value) headers[h.key] = el.value;
        });
        
        const params = {};
        currentApi.params.forEach(p => {
            const el = document.getElementById(`param-${p.key}`);
            if (el && el.value) {
                let val = el.value;
                if ((val.startsWith('[') && val.endsWith(']')) || (val.startsWith('{') && val.endsWith('}'))) {
                    try { val = JSON.parse(val); } catch(e) {}
                }
                params[p.key] = val;
            }
        });
        
        headers["api-id"] = currentApi.id;
        
        if (currentApi.path === "/api/dostk/websocket") {
            try {
                executeBtn.textContent = "연결 중...";
                await ensureWebSocket();
                
                if (responseOutput.textContent === "결과가 여기에 표시됩니다." || responseOutput.textContent === "Loading...") {
                    responseOutput.textContent = "=== WebSocket Connected ===\n";
                }
                
                ws.send(JSON.stringify({
                    action: "send",
                    data: params
                }));
                
                appendResponse({ request_sent: params });
            } catch (err) {
                appendResponse({ error: "WebSocket Error: " + err.message });
            } finally {
                executeBtn.disabled = false;
                executeBtn.textContent = "실행 (Execute)";
            }
            return;
        }
        
        try {
            const payload = {
                api_id: currentApi.id,
                path: currentApi.path,
                method: currentApi.method,
                headers: headers,
                params: params,
                appkey: safeGetItem("kiwoom_appkey") || null,
                secretkey: safeGetItem("kiwoom_secretkey") || null,
                acc_id: safeGetItem("kiwoom_accid") || null,
                base_url: safeGetItem("kiwoom_baseurl") || null
            };
            
            const res = await fetch("/api/proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            
            let output = "=== STATUS ===\n";
            output += data.status + "\n\n";
            
            if (data.error) {
                output += "=== ERROR ===\n";
                output += data.error + "\n\n";
            }
            
            output += "=== HEADERS ===\n";
            if (data.headers) {
                for (const [k, v] of Object.entries(data.headers)) {
                    output += `${k}: ${v}\n`;
                }
            }
            
            output += "\n=== BODY ===\n";
            if (data.body) {
                output += JSON.stringify(data.body, null, 2);
                lastResponseData = data.body;
                downloadBtn.style.display = "block";
            } else {
                lastResponseData = null;
                downloadBtn.style.display = "none";
            }
            
            responseOutput.textContent = output;
        } catch (e) {
            responseOutput.textContent = "Error: " + e.message;
        } finally {
            executeBtn.disabled = false;
            executeBtn.textContent = "실행 (Execute)";
        }
    };

    downloadBtn.onclick = () => {
        if (!lastResponseData) return;
        const blob = new Blob([JSON.stringify(lastResponseData, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const dateStr = new Date().toISOString().replace(/[:.]/g, "-");
        a.download = `${currentApi.id}_response_${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };
</script>

</body>
</html>
